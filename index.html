<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>收益计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
        }

        @media (max-width: 968px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        /* 表单区域样式 */
        .form-section {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            height: fit-content;
        }

        .form-section h2 {
            color: #667eea;
            margin-bottom: 25px;
            font-size: 1.5rem;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input[type="number"] {
            -moz-appearance: textfield;
        }

        .form-group input[type="number"]::-webkit-outer-spin-button,
        .form-group input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .btn {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .preview-box {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
        }

        .preview-box h3 {
            color: #667eea;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .preview-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            font-size: 0.9rem;
        }

        .preview-item strong {
            color: #333;
        }

        .preview-item.net-profit {
            border-top: 2px solid #667eea;
            margin-top: 10px;
            padding-top: 10px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .positive {
            color: #10b981;
        }

        .negative {
            color: #ef4444;
        }

        /* 表格区域样式 */
        .table-section {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .table-section h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5rem;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .filter-section {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .filter-section label {
            font-weight: 600;
            color: #333;
        }

        .filter-section input {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95rem;
        }

        .filter-section input:focus {
            outline: none;
            border-color: #667eea;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .stat-card h3 {
            font-size: 0.9rem;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .stat-card .value {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        th {
            padding: 15px 10px;
            text-align: left;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }

        th:hover {
            background: rgba(255,255,255,0.2);
        }

        th .sort-icon {
            margin-left: 5px;
            opacity: 0.7;
        }

        tbody tr {
            border-bottom: 1px solid #e0e0e0;
            transition: all 0.2s ease;
        }

        tbody tr:nth-child(even) {
            background: #f8f9fa;
        }

        tbody tr:hover {
            background: #e8eaf6;
            transform: scale(1.01);
        }

        td {
            padding: 12px 10px;
            color: #333;
        }

        .delete-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .delete-btn:hover {
            background: #dc2626;
            transform: scale(1.05);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 1.1rem;
        }

        /* 提示消息 */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #10b981;
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            transform: translateX(150%);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.error {
            background: #ef4444;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 收益计算器</h1>
        
        <div class="main-content">
            <!-- 左侧表单区域 -->
            <div class="form-section">
                <h2>📝 新增收益记录</h2>
                <form id="profitForm">
                    <div class="form-group">
                        <label for="character">角色名称</label>
                        <input type="text" id="character" required placeholder="请输入角色名称">
                    </div>
                    
                    <div class="form-group">
                        <label for="materialPrice">材料单价 (w)</label>
                        <input type="number" id="materialPrice" step="0.01" min="0" required placeholder="0">
                    </div>
                    
                    <div class="form-group">
                        <label for="quantity">数量</label>
                        <input type="number" id="quantity" step="1" min="0" required placeholder="0">
                    </div>
                    
                    <div class="form-group">
                        <label for="profit">收益 (w)</label>
                        <input type="number" id="profit" step="0.01" min="0" required placeholder="0">
                    </div>
                    
                    <div class="preview-box">
                        <h3>📊 计算预览</h3>
                        <div class="preview-item">
                            <span>成本:</span>
                            <strong id="previewCost">0 w</strong>
                        </div>
                        <div class="preview-item">
                            <span>收益:</span>
                            <strong id="previewProfit">0 w</strong>
                        </div>
                        <div class="preview-item net-profit">
                            <span>净收益:</span>
                            <strong id="previewNetProfit">0 w</strong>
                        </div>
                    </div>
                    
                    <div class="btn-group">
                        <button type="submit" class="btn btn-primary">添加记录</button>
                        <button type="reset" class="btn btn-secondary">重置</button>
                    </div>
                </form>
            </div>
            
            <!-- 右侧表格区域 -->
            <div class="table-section">
                <h2>📋 收益记录</h2>
                
                <!-- 日期筛选 -->
                <div class="filter-section">
                    <label for="dateFilter">选择日期:</label>
                    <input type="date" id="dateFilter">
                    <button class="btn btn-secondary" onclick="showAllRecords()" style="flex: 0; padding: 10px 20px;">显示全部</button>
                    <button class="btn btn-secondary" onclick="showTodayRecords()" style="flex: 0; padding: 10px 20px;">今天</button>
                </div>
                
                <!-- 统计卡片 -->
                <div class="stats-container">
                    <div class="stat-card">
                        <h3>总收益</h3>
                        <div class="value" id="totalProfit">0 w</div>
                    </div>
                    <div class="stat-card">
                        <h3>总成本</h3>
                        <div class="value" id="totalCost">0 w</div>
                    </div>
                    <div class="stat-card">
                        <h3>净收益</h3>
                        <div class="value" id="totalNetProfit">0 w</div>
                    </div>
                </div>
                
                <!-- 数据表格 -->
                <div class="table-container">
                    <table id="recordsTable">
                        <thead>
                            <tr>
                                <th onclick="sortTable('date')">日期 <span class="sort-icon">↕</span></th>
                                <th onclick="sortTable('character')">角色 <span class="sort-icon">↕</span></th>
                                <th onclick="sortTable('materialPrice')">单价 <span class="sort-icon">↕</span></th>
                                <th onclick="sortTable('quantity')">数量 <span class="sort-icon">↕</span></th>
                                <th onclick="sortTable('cost')">成本 <span class="sort-icon">↕</span></th>
                                <th onclick="sortTable('profit')">收益 <span class="sort-icon">↕</span></th>
                                <th onclick="sortTable('netProfit')">净收益 <span class="sort-icon">↕</span></th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="recordsBody">
                        </tbody>
                    </table>
                    
                    <div class="empty-state" id="emptyState" style="display: none;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                        </svg>
                        <p>暂无记录，添加第一条收益记录吧！</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 提示消息 -->
    <div class="toast" id="toast"></div>

    <script>
        // 数据存储键名
        const STORAGE_KEY = 'profitCalculatorData';
        
        // 当前排序状态
        let currentSort = {
            field: 'netProfit',
            direction: 'desc'
        };
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadRecords();
            setupFormListeners();
            showTodayRecords();
        });
        
        // 设置表单监听
        function setupFormListeners() {
            const form = document.getElementById('profitForm');
            form.addEventListener('submit', handleSubmit);
            form.addEventListener('reset', handleReset);
            
            // 实时计算预览
            ['materialPrice', 'quantity', 'profit'].forEach(id => {
                document.getElementById(id).addEventListener('input', updatePreview);
            });
        }
        
        // 更新预览
        function updatePreview() {
            const materialPrice = parseFloat(document.getElementById('materialPrice').value) || 0;
            const quantity = parseFloat(document.getElementById('quantity').value) || 0;
            const profit = parseFloat(document.getElementById('profit').value) || 0;
            
            const cost = materialPrice * quantity;
            const netProfit = profit - cost;
            
            document.getElementById('previewCost').textContent = cost.toFixed(2) + ' w';
            document.getElementById('previewProfit').textContent = profit.toFixed(2) + ' w';
            
            const netProfitEl = document.getElementById('previewNetProfit');
            netProfitEl.textContent = netProfit.toFixed(2) + ' w';
            netProfitEl.className = netProfit >= 0 ? 'positive' : 'negative';
        }
        
        // 处理表单提交
        function handleSubmit(e) {
            e.preventDefault();
            
            const character = document.getElementById('character').value.trim();
            const materialPrice = parseFloat(document.getElementById('materialPrice').value);
            const quantity = parseFloat(document.getElementById('quantity').value);
            const profit = parseFloat(document.getElementById('profit').value);
            
            if (!character) {
                showToast('请输入角色名称', true);
                return;
            }
            
            if (materialPrice < 0 || quantity < 0 || profit < 0) {
                showToast('数值不能为负数', true);
                return;
            }
            
            const cost = materialPrice * quantity;
            const netProfit = profit - cost;
            
            const record = {
                id: Date.now(),
                date: new Date().toISOString().split('T')[0],
                character,
                materialPrice,
                quantity,
                cost,
                profit,
                netProfit
            };
            
            saveRecord(record);
            form.reset();
            updatePreview();
            refreshTable();
            showToast('记录添加成功！');
        }
        
        // 处理表单重置
        function handleReset() {
            setTimeout(() => {
                updatePreview();
            }, 0);
        }
        
        // 保存记录
        function saveRecord(record) {
            const data = getStoredData();
            data.records.push(record);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }
        
        // 获取存储数据
        function getStoredData() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                return JSON.parse(stored);
            }
            return { records: [] };
        }
        
        // 加载记录
        function loadRecords() {
            const data = getStoredData();
            renderTable(data.records);
        }
        
        // 刷新表格（保持当前筛选状态）
        function refreshTable() {
            const dateFilter = document.getElementById('dateFilter').value;
            const data = getStoredData();
            
            let records = data.records;
            if (dateFilter) {
                records = records.filter(record => record.date === dateFilter);
            }
            
            renderTable(records);
        }
        
        // 显示今天记录
        function showTodayRecords() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('dateFilter').value = today;
            filterByDate(today);
        }
        
        // 显示全部记录
        function showAllRecords() {
            document.getElementById('dateFilter').value = '';
            const data = getStoredData();
            renderTable(data.records);
        }
        
        // 按日期筛选
        function filterByDate(date) {
            const data = getStoredData();
            const filtered = data.records.filter(record => record.date === date);
            renderTable(filtered);
        }
        
        // 日期选择器变更
        document.getElementById('dateFilter').addEventListener('change', function() {
            if (this.value) {
                filterByDate(this.value);
            } else {
                showAllRecords();
            }
        });
        
        // 渲染表格
        function renderTable(records) {
            const tbody = document.getElementById('recordsBody');
            const emptyState = document.getElementById('emptyState');
            
            // 排序
            records.sort((a, b) => {
                let aVal = a[currentSort.field];
                let bVal = b[currentSort.field];
                
                if (currentSort.direction === 'desc') {
                    return bVal - aVal;
                } else {
                    return aVal - bVal;
                }
            });
            
            if (records.length === 0) {
                tbody.innerHTML = '';
                emptyState.style.display = 'block';
                updateStats([]);
                return;
            }
            
            emptyState.style.display = 'none';
            
            tbody.innerHTML = records.map(record => `
                <tr>
                    <td>${record.date}</td>
                    <td>${record.character}</td>
                    <td>${record.materialPrice.toFixed(2)}</td>
                    <td>${record.quantity}</td>
                    <td>${record.cost.toFixed(2)}</td>
                    <td>${record.profit.toFixed(2)}</td>
                    <td class="${record.netProfit >= 0 ? 'positive' : 'negative'}">
                        ${record.netProfit.toFixed(2)}
                    </td>
                    <td>
                        <button class="delete-btn" onclick="deleteRecord(${record.id})">删除</button>
                    </td>
                </tr>
            `).join('');
            
            updateStats(records);
        }
        
        // 更新统计
        function updateStats(records) {
            const totalProfit = records.reduce((sum, r) => sum + r.profit, 0);
            const totalCost = records.reduce((sum, r) => sum + r.cost, 0);
            const totalNetProfit = records.reduce((sum, r) => sum + r.netProfit, 0);
            
            document.getElementById('totalProfit').textContent = totalProfit.toFixed(2) + ' w';
            document.getElementById('totalCost').textContent = totalCost.toFixed(2) + ' w';
            
            const netProfitEl = document.getElementById('totalNetProfit');
            netProfitEl.textContent = totalNetProfit.toFixed(2) + ' w';
            netProfitEl.className = 'value ' + (totalNetProfit >= 0 ? 'positive' : 'negative');
        }
        
        // 排序表格
        function sortTable(field) {
            if (currentSort.field === field) {
                currentSort.direction = currentSort.direction === 'desc' ? 'asc' : 'desc';
            } else {
                currentSort.field = field;
                currentSort.direction = 'desc';
            }
            
            const data = getStoredData();
            const dateFilter = document.getElementById('dateFilter').value;
            
            let records = data.records;
            if (dateFilter) {
                records = records.filter(record => record.date === dateFilter);
            }
            
            renderTable(records);
        }
        
        // 删除记录
        function deleteRecord(id) {
            if (!confirm('确定要删除这条记录吗？')) {
                return;
            }
            
            const data = getStoredData();
            data.records = data.records.filter(record => record.id !== id);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            
            const dateFilter = document.getElementById('dateFilter').value;
            if (dateFilter) {
                filterByDate(dateFilter);
            } else {
                loadRecords();
            }
            
            showToast('记录已删除');
        }
        
        // 显示提示消息
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
